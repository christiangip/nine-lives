name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - name: Set up Godot 4.6
        uses: chickensoft-games/setup-godot@v2
        with:
          version: 4.6.0
          use-dotnet: false
          include-templates: true   # export templates for the smoke step (task 21, FR-21-4)
      - name: Import project (build caches)
        run: godot --headless --import || true
      - name: Run GUT tests
        run: >
          godot --headless -s addons/gut/gut_cmdln.gd
          -gconfig=game/tests/.gutconfig.json -gexit
      - name: Validate content data (task 19)
        run: bash tools/scripts/validate_content.sh
      - name: Lint task-list / doc links
        run: bash tools/scripts/check_docs.sh
      - name: Check asset manifest + LFS
        run: bash tools/scripts/check_assets.sh
      - name: Export smoke test (Linux, best-effort)
        continue-on-error: true   # skips cleanly if export templates are unavailable — real builds are the manual matrix
        run: |
          mkdir -p build/linux
          godot --headless --export-release "Linux/X11" build/linux/NineLives.x86_64 || true
          if [ -f build/linux/NineLives.x86_64 ]; then
            echo "Linux export produced a binary ($(du -h build/linux/NineLives.x86_64 | cut -f1)) — see docs/RELEASE_CHECKLIST.md."
          else
            echo "Export skipped (templates absent / version mismatch); build manually per docs/RELEASE_CHECKLIST.md."
          fi
